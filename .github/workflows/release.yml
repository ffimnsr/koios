name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - name: Validate tag and version
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${GITHUB_REF_NAME:-}" != "v${version}" ]]; then
            echo "tag ${GITHUB_REF_NAME:-<none>} does not match VERSION ${version}" >&2
            exit 1
          fi

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          mkdir -p dist
          artifact="koios_${version}_${GOOS}_${GOARCH}"
          scripts/release.sh "dist/${artifact}"
          tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
          shasum -a 256 "dist/${artifact}.tar.gz" > "dist/${artifact}.tar.gz.sha256"
          rm -f "dist/${artifact}"

      - name: Generate CycloneDX SBOM
        if: matrix.goos == 'linux'
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.9.1
          "$(go env GOPATH)/bin/cyclonedx-gomod" mod -licenses -json -output "dist/koios_${version}_sbom.json"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Extract release notes from changelog
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" {capture=1}
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" {exit}
            capture {print}
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "release notes for ${version} not found in CHANGELOG.md" >&2
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="koios ${tag#v}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --title "$title" --notes-file release-notes.md
          fi
