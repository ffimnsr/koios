name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - name: Validate tag and version
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${GITHUB_REF_NAME:-}" != "v${version}" ]]; then
            echo "tag ${GITHUB_REF_NAME:-<none>} does not match VERSION ${version}" >&2
            exit 1
          fi

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          mkdir -p dist
          artifact="koios_${version}_${GOOS}_${GOARCH}"
          scripts/release.sh "dist/${artifact}"
          tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
          shasum -a 256 "dist/${artifact}.tar.gz" > "dist/${artifact}.tar.gz.sha256"
          rm -f "dist/${artifact}"

      - name: Generate CycloneDX SBOM
        if: matrix.goos == 'linux'
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.9.0
          "$(go env GOPATH)/bin/cyclonedx-gomod" mod -licenses -json -output "dist/koios_${version}_sbom.json"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Extract release notes from changelog
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" {capture=1}
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" {exit}
            capture {print}
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "release notes for ${version} not found in CHANGELOG.md" >&2
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="koios ${tag#v}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --title "$title" --notes-file release-notes.md
          fi

      - name: Prepare image metadata
        id: image-vars
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          git_hash="$(git rev-parse --short HEAD)"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "git_hash=${git_hash}" >> "$GITHUB_OUTPUT"
          echo "build_time=${build_time}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.image-vars.outputs.version }}
            GIT_HASH=${{ steps.image-vars.outputs.git_hash }}
            BUILD_TIME=${{ steps.image-vars.outputs.build_time }}
