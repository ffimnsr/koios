# Koios configuration file.
# Generated by: koios init

[server]
listen_addr = %s
request_timeout = %s
allowed_origins = %s

%s%s

[session]
max_messages = %d
retention = %s
max_entries = %d
idle_reset_after = %s
idle_prune_after = %s
idle_prune_keep = %d
daily_reset_time = %s
prune_keep_tool_messages = %d

[compaction]
threshold = %d
reserve = %d

[memory]
inject = %t
top_k = %d

[memory.embed]
enabled = %t
model = %s

[memory.milvus]
address = %s
collection = %s
enabled = %t

[cron]
max_concurrent = %d

[heartbeat]
enabled = %t
every = %s

[agent]
