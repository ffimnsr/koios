# Koios configuration file.
# Generated by: koios init

[server]
listen_addr = ":8080"
request_timeout = "2m"
allowed_origins = []

[llm]
# default_profile selects a named [[llm.profiles]] entry as the primary LLM.
# When set, the profile's provider/api_key/model/base_url are used.
default_profile = "default"
# lightweight_model is used for simple/short queries (≤15 words).
# lightweight_model = ""
# fallback_models = []

[[llm.profiles]]
name = "default"
provider = "openai"
model = "gpt-4o"
# api_key = ""
# base_url = ""

# Add more profiles for multi-model routing:
# [[llm.profiles]]
# name = "fast"
# provider = "openai"
# model = "gpt-4o-mini"
# api_key = ""

# [mcp]
# [[mcp.servers]]
# name = "filesystem"
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
# enabled = true

# [[mcp.servers]]
# name = "myserver"
# transport = "http"
# url = "http://localhost:3000/mcp"
# enabled = true

[session]
max_messages = 100
retention = "0s"
max_entries = 0
idle_reset_after = "0s"
idle_prune_after = "0s"
idle_prune_keep = 0
daily_reset_time = ""
prune_keep_tool_messages = 8

[compaction]
threshold = 0
reserve = 20

[memory]
embed_model = "text-embedding-3-small"
inject = false
top_k = 3

[memory.milvus]
address = "localhost:19530"
collection = "koios_memory"
enabled = false

[cron]
max_concurrent = 1

[heartbeat]
enabled = true
every = "30m"

[agent]
max_children = 4
retry_attempts = 3
retry_initial_backoff = "500ms"
retry_max_backoff = "5s"
retry_status_codes = [429, 500, 502, 503, 504]

[tools]
profile = "full"
allow = []
deny = []

[tools.code_execution]
enabled = false
network_enabled = false
default_timeout = "10s"
max_timeout = "30s"
max_stdout_bytes = 65536
max_stderr_bytes = 65536
max_artifact_bytes = 1048576
max_open_files = 64
max_processes = 32
cpu_seconds = 10
memory_bytes = 268435456

[tools.process]
enabled = false
stop_timeout = "5s"
log_tail_bytes = 65536
max_processes_per_peer = 8

[tools.exec]
enabled = true
enable_deny_patterns = true
custom_deny_patterns = []
custom_allow_patterns = []
default_timeout = "30s"
max_timeout = "5m"
approval_mode = "dangerous"
approval_ttl = "15m"

[tools.exec.isolation]
enabled = false
expose_paths = []

[workspace]
root = "./workspace"
per_agent = true
max_file_bytes = 1048576

[log]
level = "info"

[monitor]
stale_threshold = "0s"
max_restarts = 5
