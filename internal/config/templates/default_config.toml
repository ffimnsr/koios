# Koios configuration file.
# Generated by: koios init

[server]
listen_addr = ":8080"
request_timeout = "2m"
allowed_origins = []

[llm]
# default_profile selects a named [[llm.profiles]] entry as the primary LLM.
# When set, the profile's provider/api_key/model/base_url are used.
idle_timeout = "30s"
# idle_timeout cancels a streaming response if the provider stops sending bytes.
# Set to "0s" to disable the stall watchdog.
default_profile = "default"
# lightweight_model is used for simple/short queries (≤15 words).
# lightweight_model = ""
# fallback_models = []

[[llm.profiles]]
name = "default"
provider = "openai"
model = "gpt-4o"
# Plaintext works, but you can also paste a value from `koios hide-secret`.
# api_key = ""
# base_url = ""

# Add more profiles for multi-model routing:
# [[llm.profiles]]
# name = "fast"
# provider = "openai"
# model = "gpt-4o-mini"
# api_key = ""

# Local Ollama (no API key required):
# [[llm.profiles]]
# name = "local"
# provider = "ollama"
# model = "llama3"
# base_url = "http://localhost:11434"

# vLLM (local OpenAI-compatible server):
# [[llm.profiles]]
# name = "vllm"
# provider = "vllm"
# model = "meta-llama/Meta-Llama-3-8B-Instruct"
# base_url = "http://localhost:8000"

# LiteLLM proxy (unified gateway over many backends):
# [[llm.profiles]]
# name = "litellm"
# provider = "litellm"
# model = "gpt-4o"
# base_url = "http://localhost:4000"
# api_key = ""

# Google Gemini (OpenAI-compatible endpoint):
# [[llm.profiles]]
# name = "gemini"
# provider = "gemini"
# model = "gemini-2.0-flash"
# api_key = ""

# [mcp]
# [[mcp.servers]]
# name = "filesystem"
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
# enabled = true

# [[mcp.servers]]
# name = "myserver"
# transport = "http"
# url = "http://localhost:3000/mcp"
# enabled = true

# [browser]
# default_profile = "work"
#
# [[browser.profiles]]
# name = "work"
# mode = "managed"
# enabled = true
# # Optional host policy. Deny wins; allowlist only narrows access further.
# # host_allowlist = ["example.com", "*.example.org"]
# # host_denylist = ["admin.example.com"]
# headless = true
# # Optional dedicated profile dir. Defaults to ./workspace/browser/<profile>.
# # user_data_dir = "./workspace/browser/work"
#
# [[browser.profiles]]
# name = "personal"
# mode = "existing_session"
# enabled = true
# # Point at the Chrome profile you want Koios to attach to.
# user_data_dir = "~/.config/google-chrome"

# [[browser.profiles]]
# name = "remote-debug"
# mode = "browser_url"
# enabled = true
# browser_url = "http://127.0.0.1:9222"

[session]
max_messages = 100
retention = "0s"
max_entries = 0
idle_reset_after = "0s"
idle_prune_after = "0s"
idle_prune_keep = 0
daily_reset_time = ""
prune_keep_tool_messages = 8

[compaction]
threshold = 0
reserve = 20

[memory]
inject = false
top_k = 3

[memory.embed]
enabled = false
model = "text-embedding-3-small"

[memory.milvus]
address = "localhost:19530"
collection = "koios_memory"
enabled = false

[cron]
max_concurrent = 1

[heartbeat]
enabled = true
every = "30m"

[agent]
max_children = 4
retry_attempts = 3
retry_initial_backoff = "500ms"
retry_max_backoff = "5s"
retry_status_codes = [429, 500, 502, 503, 504]

[tools]
profile = "full"
allow = []
deny = []

[tools.code_execution]
enabled = false
network_enabled = false
default_timeout = "10s"
max_timeout = "30s"
max_stdout_bytes = 65536
max_stderr_bytes = 65536
max_artifact_bytes = 1048576
max_open_files = 64
max_processes = 32
cpu_seconds = 10
memory_bytes = 268435456

[tools.process]
enabled = false
stop_timeout = "5s"
log_tail_bytes = 65536
max_processes_per_peer = 8

[extensions]
# Extra directories to scan for koios-extension.toml manifests.
# The workspace root's ./extensions directory is always scanned automatically.
dirs = []
# Optional extension id/name allowlist and denylist. Deny wins.
allow = []
deny = []

# [hooks]
# webhook_token = "replace-me"
# timeout = "2s"
# fail_closed = false
#
# [[hooks.mappings]]
# name = "github-pr"
# type = "session.wake"
#
# [[hooks.mappings.fields]]
# to = "peer_id"
# value = "default"
#
# [[hooks.mappings.fields]]
# to = "prompt"
# template = "GitHub {{headers.x-github-event}}: {{body.pull_request.title}}"

[channels.telegram]
enabled = false
# Bot token from BotFather.
bot_token = ""
# mode = "polling" or "webhook"
mode = "polling"
poll_timeout = "25s"
# Public HTTPS URL that Telegram should deliver updates to in webhook mode.
webhook_url = ""
# Optional X-Telegram-Bot-Api-Secret-Token value.
webhook_secret = ""
# Optional peer that owns routed Telegram inbox sessions.
# When set, chat traffic lands in <peer>::channel::<telegram chat key>.
inbox_peer_id = ""
# Maximum characters per outbound Telegram message chunk.
text_chunk_limit = 4096
# text_chunk_mode = "paragraph", "word", or "hard"
text_chunk_mode = "paragraph"
# stream_queue_mode = "burst" or "throttle"
stream_queue_mode = "burst"
# Delay between chunk sends when stream_queue_mode = "throttle".
stream_throttle = "750ms"
# allowed_chat_ids = [123456789]
allowed_chat_ids = []
# allowed_sender_ids = [123456789]
allowed_sender_ids = []
# command_sender_ids restrict slash commands in groups without blocking normal messages.
# command_sender_ids = [123456789]
command_sender_ids = []
# activation_mode = "always" or "mention"
activation_mode = "always"
# reply_activation lets replies to the bot count as activation when activation_mode = "mention".
reply_activation = true
# dm_policy = "open", "pairing", or "closed"
dm_policy = "open"
pairing_code_ttl = "24h"
# thread_mode = "topic" keeps separate sessions per Telegram topic.
# thread_mode = "chat" collapses all topics in one chat onto one session.
thread_mode = "topic"

# [[channels.telegram.groups]]
# chat_id = -1001234567890
# activation_mode = "mention"
# allowed_sender_ids = [123456789]
# command_sender_ids = [123456789]
# reply_activation = true
# allowed_topic_ids = [11, 12]
# thread_mode = "chat"

[tools.exec]
enabled = true
enable_deny_patterns = true
custom_deny_patterns = []
custom_allow_patterns = []
default_timeout = "30s"
max_timeout = "5m"
approval_mode = "dangerous"
approval_ttl = "15m"

[tools.exec.isolation]
enabled = false
expose_paths = []

[workspace]
root = "./workspace"
per_agent = true
max_file_bytes = 1048576

[log]
level = "info"

[monitor]
stale_threshold = "0s"
max_restarts = 5
