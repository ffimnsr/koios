# Koios configuration file.
# Generated by: koios init --wizard

[server]
listen_addr = %s
request_timeout = "2m"
allowed_origins = []

[llm]
provider = %s
model = %s
%s
# base_url = ""

[session]
max_messages = 100
dir = %s
prune_keep_tool_messages = 8

[compaction]
threshold = 0
reserve = 20

[memory]
db_path = "./data/memory.db"
embed_model = "text-embedding-3-small"
inject = false
top_k = 3

[cron]
dir = %s
max_concurrent = 1

[heartbeat]
enabled = true
every = "30m"

[agent]
dir = %s
max_children = 4
retry_attempts = 3
retry_initial_backoff = "500ms"
retry_max_backoff = "5s"

[workspace]
root = %s
per_agent = true
max_file_bytes = 1048576
