tasks:
  install:
    commands:
      - command: |
          test -d ~/.local/bin || mkdir -p ~/.local/bin
          go build -o ~/.local/bin/koios .
          echo "Koios installed to ~/.local/bin/koios"
    description: Install the application in the local bin directory
  install-tools:
    commands:
      - command: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
    description: Install tools that are needed for development
  dev:
    commands:
      - command: go run .
        retrigger: true
    description: Run the application in development mode
  build:
    commands:
      - command: go build ./...
    description: Build and compile the code
  format:
    commands:
      - command: go fmt ./...
      - command: goimports -w .
    description: Format the code using go fmt
  lint:
    commands:
      - command: go vet ./...
      - command: go build ./...
      - command: staticcheck ./...
    description: Lint the code using go vet
  deep-lint:
    commands:
      - command: golangci-lint run
    description: Launch a deep lint for static analysiis and best practice enforcement
  test:
    commands:
      - command: go test ./...
      - command: go test  -race ./...
    description: Run all tests
  install-githooks:
    commands:
      - command: |
          test -d .git/hooks && rm -rf .git/hooks
          ln -sf .githooks .git/hooks
          echo "Git hooks installed from .githooks directory"
    description: Install git hooks from the .githooks directory
  uninstall-githooks:
    commands:
      - command: |
          rm -rf .git/hooks
          echo "Git hooks uninstalled by removing the .git/hooks directory"
    description: Uninstall git hooks by removing the .git/hooks directory
  lf:
    commands:
      - |
        git ls-files -z --cached --others --exclude-standard \
        | xargs -0 -I{} sh -c '[ -f "{}" ] && wc -l "{}"' \
        | awk '$1 > 1000' \
        | sort -nr
    description: Check for files with more than 1000 LOC.
  build-image:
    commands:
      - command: |
          podman build \
            --file Containerfile \
            --build-arg VERSION="$(cat VERSION)" \
            --build-arg GIT_HASH="$(git rev-parse --short HEAD)" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t ghcr.io/ffimnsr/koios:latest \
            -t localhost/koios:latest \
            .
    description: Build image
