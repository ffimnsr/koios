version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - gocyclo
    - gosec
    - govet
    - nilerr
    - noctx
    - revive
    - staticcheck
    - unparam
    - unused
  settings:
    gocyclo:
      min-complexity: 35
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      - path: contrib/demo-app/node_modules/
        linters:
          - gocyclo
          - govet
      - path: _test\.go
        linters:
          - gocyclo
      - path: internal/agent/runtime\.go
        linters:
          - gocyclo
      - path: internal/app/app\.go
        linters:
          - gocyclo
      - path: internal/cli/doctor\.go
        linters:
          - gocyclo
      - path: internal/config/config\.go
        linters:
          - gocyclo
      - path: internal/handler/chat_tools_execute_.*\.go
        linters:
          - gocyclo
      - path: internal/handler/introspection_tools\.go
        linters:
          - gocyclo
      - path: internal/handler/webhook_http\.go
        linters:
          - gocyclo
      - path: internal/handler/ws_dispatch\.go
        linters:
          - gocyclo
      - path: internal/orchestrator/lifecycle\.go
        linters:
          - gocyclo
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
