run:
  timeout: 10m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  disable-all: true
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - gocyclo
    - gosec
    - govet
    - nilerr
    - noctx
    - revive
    - staticcheck
    - unparam
    - unused

linters-settings:
  gocyclo:
    min-complexity: 15
  revive:
    rules:
      - name: exported
        disabled: true
